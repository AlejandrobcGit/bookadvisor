<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:insert="~{fragments/fragment.html :: cabecera}"></th:block>
    <title>Editar Genero</title>
</head>

<body>
    <nav>
        <th:block th:insert="~{fragments/fragment.html :: nav}"></th:block>
    </nav>
    <section class="container mt-5">
        <h1 class="mb-4">Editar Genero</h1>
        <div class="row">
            <form method="post" action="#" th:action="@{/genero/editar}" th:object="${genero}">
                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label><strong>ID: </strong></label>
                        <input type="text" th:field="*{id}" readonly
                            th:classappend="${#fields.hasErrors('id')} ? 'cssError form-control':'form-control'">
                    </div>
                    <div class="form-group col-md-6">
                        <label><strong>Valor: </strong></label>
                        <input type="text" th:field="*{nombre}"
                            th:classappend="${#fields.hasErrors('nombre')} ? 'cssError form-control':'form-control'">
                    </div>
                </div>
                <input type="submit" class="btn btn-primary">
                    <a href="/libros" class="btn btn-secondary">Atrás</a>
            </form>
        </div>
    </section>
    <footer class="mt-5">
        <th:block th:insert="~{fragments/fragment.html :: footer}"></th:block>
    </footer>
</body>

</html>
