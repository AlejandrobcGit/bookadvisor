<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:insert="~{fragments/fragment.html :: cabecera}"></th:block>
    <title>Alta Valoracion</title>
</head>

<body>
    <nav>
        <th:block th:insert="~{fragments/fragment.html :: nav}"></th:block>
    </nav>
    <section class="container mt-5">
        <h1 class="mb-4">Alta Valoracion</h1>
        <div class="row">
            <form method="post" th:action="@{/valoracion/nuevo(idlibro=${valoracion.libro.id})}" th:object="${valoracion}">
                <label><strong>Titulo: </strong><span th:text="${valoracion.libro.titulo}"></span></label><br>
                <label><strong>Autor: </strong><span th:text="${valoracion.libro.autor}"></span></label>
                <div class="form-row">
                    <div class="form-group col-md-4">
                        <label class="mr-2"><strong>id: </strong></label>
                        <input type="number" th:field="*{id}" readonly
                            class="form-control" th:classappend="${#fields.hasErrors('id')} ? 'cssError form-control':'form-control'">
                    </div>
                    <div class="form-group col-md-4">
                        <label class="mr-2"><strong>Puntos: </strong></label>
                        <input type="number" th:field="*{puntos}" max="5" min="0"
                            class="form-control" th:classappend="${#fields.hasErrors('puntos')} ? 'cssError form-control':'form-control'">
                    </div>
                    <div class="form-group col-md-12">
                        <label><strong>Observación: </strong></label>
                        <textarea th:field="*{observacion}" 
                            th:classappend="${#fields.hasErrors('observacion')} ? 'cssError form-control':'form-control'"
                            rows="10">
                        </textarea>
                    </div>
                </div>
                <input type="submit" class="btn btn-primary">
                <a href="/libros" class="btn btn-secondary">Atrás</a>
            </form>
        </div>
    </section>
    <footer class="mt-5">
        <th:block th:insert="~{fragments/fragment.html :: footer}"></th:block>
    </footer>
</body>

</html>
