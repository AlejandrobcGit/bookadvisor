<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <th:block th:insert="~{fragments/fragment.html :: cabecera}"></th:block>
    <title>Listado de Usuarios</title>
</head>

<body>
    <nav>
        <th:block th:insert="~{fragments/fragment.html :: nav}"></th:block>
    </nav>
    <div class="container mt-5">
        <h1 class="mb-4">Listado de Usuarios</h1>
        <table class="table table-bordered table-striped">
            <thead class="thead-dark text-white">
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Rol</th>
                    <th>Editar</th>
                    <th>Borrar</th>
                </tr>
            </thead>            
            <tbody>
                <tr th:each="user : ${listaUsers}">
                    <td th:text="${user.id}"></td>
                    <td th:text="${user.nombre}"></td>
                    <td th:text="${user.rol}"></td>
                    <td><a class="btn btn-warning btn-sm" th:href="@{/user/Editar/{id}(id=${user.id})}">Editar</a></td>
                    <td><a class="btn btn-danger btn-sm" th:href="@{/user/Borrar/{id}(id=${user.id})}">Borrar</a></td>
                </tr>
            </tbody>
        </table>
        <div class="mt-3">
            <p><span th:if="${error} != null" class="alert alert-danger" th:text="${error}"></span></p><br>
            <a href="/user/New" class="btn btn-success">Alta Usuario</a>
            <a href="/" class="btn btn-secondary">Inicio</a>
        </div>
    </div>

    <footer class="mt-5">
        <th:block th:insert="~{fragments/fragment.html :: footer}"></th:block>
    </footer>
</body>

</html>
